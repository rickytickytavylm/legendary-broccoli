<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админка — Система Молодцова</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0d10;
    --surface: #14151a;
    --surface-2: #1c1d24;
    --border: rgba(255,255,255,.08);
    --text: #e8e8ec;
    --text-2: rgba(255,255,255,.55);
    --accent: #8e7cc3;
    --accent-2: #5b8def;
    --danger: #e86d6d;
    --radius: 14px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.45;
  }
  .admin-header {
    position: sticky; top: 0; z-index: 10;
    background: rgba(12,13,16,.72);
    -webkit-backdrop-filter: blur(24px) saturate(140%);
    backdrop-filter: blur(24px) saturate(140%);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex; align-items: center; gap: 16px;
  }
  .admin-header h1 {
    font-size: 16px; font-weight: 700; letter-spacing: -.01em;
  }
  .admin-header .badge {
    font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em;
    padding: 3px 8px; border-radius: 6px;
    background: rgba(94,141,239,.14); color: var(--accent-2);
    border: 1px solid rgba(94,141,239,.25);
  }
  .admin-shell {
    max-width: 1100px; margin: 0 auto; padding: 20px;
  }
  .tabs {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .tab {
    appearance: none; border: none; cursor: pointer;
    background: transparent; color: var(--text-2);
    font-family: inherit; font-size: 13.5px; font-weight: 500;
    padding: 8px 14px; border-radius: 10px;
    transition: background .18s, color .18s;
  }
  .tab:hover { background: rgba(255,255,255,.06); color: var(--text); }
  .tab.active { background: rgba(255,255,255,.10); color: var(--text); }
  .panel { display: none; }
  .panel.active { display: block; }

  .table-wrap {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  table {
    width: 100%; border-collapse: collapse; font-size: 13px;
  }
  th, td { padding: 10px 14px; text-align: left; }
  th {
    background: var(--surface-2);
    color: var(--text-2); font-weight: 600; font-size: 11.5px;
    text-transform: uppercase; letter-spacing: .06em;
    border-bottom: 1px solid var(--border);
  }
  tr + tr td { border-top: 1px solid var(--border); }
  td { color: var(--text); }
  .muted { color: var(--text-2); }
  .empty {
    text-align: center; color: var(--text-2); padding: 40px 20px;
  }
  .search {
    width: 100%; max-width: 360px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 12px; color: var(--text);
    font-family: inherit; font-size: 13px;
    margin-bottom: 12px;
    outline: none;
  }
  .search:focus { border-color: rgba(94,141,239,.45); }
  .tag {
    display: inline-block; font-size: 10.5px; font-weight: 600;
    padding: 2px 7px; border-radius: 6px; text-transform: uppercase; letter-spacing: .04em;
  }
  .tag-pro { background: rgba(94,141,239,.14); color: var(--accent-2); border: 1px solid rgba(94,141,239,.25); }
  .tag-free { background: rgba(255,255,255,.06); color: var(--text-2); border: 1px solid rgba(255,255,255,.10); }
  .copy-btn {
    appearance: none; border: none; cursor: pointer;
    background: rgba(255,255,255,.07); color: var(--text-2);
    font-family: inherit; font-size: 12px; font-weight: 500;
    padding: 4px 10px; border-radius: 6px;
    transition: background .15s;
  }
  .copy-btn:hover { background: rgba(255,255,255,.12); color: var(--text); }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--surface-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 18px; font-size: 13px; font-weight: 500;
    opacity: 0; pointer-events: none; transition: opacity .25s;
    z-index: 100;
  }
  .toast.show { opacity: 1; }
  @media (max-width: 600px) {
    .admin-shell { padding: 12px; }
    th, td { padding: 8px 10px; }
  }
</style>
</head>
<body>
  <div class="admin-header">
    <h1>Система Молодцова</h1>
    <span class="badge">Админка</span>
  </div>

  <div class="admin-shell">
    <div class="tabs" id="tabs">
      <button class="tab active" data-panel="overview">Обзор</button>
      <button class="tab" data-panel="users">Пользователи</button>
      <button class="tab" data-panel="emails">Почты</button>
      <button class="tab" data-panel="ai">AI-чаты</button>
      <button class="tab" data-panel="feed">Лента</button>
      <button class="tab" data-panel="chat">Общий чат</button>
    </div>

    <div id="panel-overview" class="panel active">
      <p class="muted">Загрузка…</p>
    </div>
    <div id="panel-users" class="panel">
      <input class="search" id="users-search" placeholder="Поиск по имени, email, телефону…" />
      <div class="table-wrap" id="users-table-wrap"><p class="empty">Загрузка…</p></div>
    </div>
    <div id="panel-emails" class="panel">
      <input class="search" id="emails-search" placeholder="Фильтр по email…" />
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;">
        <button class="copy-btn" id="copy-all-emails">Скопировать все email</button>
        <button class="copy-btn" id="copy-pro-emails">Скопировать Pro email</button>
      </div>
      <div class="table-wrap" id="emails-table-wrap"><p class="empty">Загрузка…</p></div>
    </div>
    <div id="panel-ai" class="panel"><p class="muted">Раздел AI-чатов</p></div>
    <div id="panel-feed" class="panel"><p class="muted">Раздел ленты</p></div>
    <div id="panel-chat" class="panel"><p class="muted">Раздел общего чата</p></div>
  </div>

  <div class="toast" id="toast"></div>

<script>
const API_BASE = window.API_BASE || (location.hostname === 'localhost' ? 'http://localhost:3000/api' : 'https://web-production-3cb7a.up.railway.app/api');
let ADMIN_KEY = localStorage.getItem('sistema:adminKey') || '';
if (!ADMIN_KEY && location.protocol !== 'file:') {
  const entered = prompt('Введите Admin Key:');
  if (entered) { ADMIN_KEY = entered; localStorage.setItem('sistema:adminKey', entered); }
}

function api(path) {
  const base = API_BASE.replace(/\/$/, '');
  return (base ? base + path : path);
}
async function adminFetch(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', 'x-admin-key': ADMIN_KEY },
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(api(path), opts);
  if (res.status === 401) {
    throw Object.assign(new Error('Admin key required'), { code: 'ADMIN_KEY_REQUIRED', status: 401 });
  }
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: 'Request failed' }));
    throw Object.assign(new Error(err.error || 'Request failed'), { status: res.status });
  }
  return res.status === 204 ? null : res.json();
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1600);
}

function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('ru-RU', { day:'numeric', month:'short', year:'numeric' });
}
function escapeHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Tabs
const tabs = document.querySelectorAll('.tab');
const panels = document.querySelectorAll('.panel');
tabs.forEach(t => {
  t.addEventListener('click', () => {
    const id = t.dataset.panel;
    tabs.forEach(x => x.classList.remove('active'));
    panels.forEach(p => p.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('panel-' + id).classList.add('active');
    if (id === 'users' && !usersLoaded) loadUsers();
    if (id === 'emails' && !emailsLoaded) loadEmails();
  });
});

let usersLoaded = false, emailsLoaded = false;

async function loadUsers() {
  try {
    const data = await adminFetch('GET', '/admin/users?limit=200');
    const users = data.users || [];
    const wrap = document.getElementById('users-table-wrap');
    if (users.length === 0) { wrap.innerHTML = '<p class="empty">Нет пользователей</p>'; usersLoaded = true; return; }
    wrap.innerHTML = `
      <table>
        <thead><tr>
          <th>ID</th><th>Имя</th><th>Email</th><th>Телефон</th>
          <th>Подписка</th><th>Регистрация</th>
        </tr></thead>
        <tbody>${users.map(u => `
          <tr>
            <td class="muted">${u.id}</td>
            <td>${escapeHtml(u.display_name || u.first_name || u.telegram_username || u.yandex_login || '—')}</td>
            <td>${escapeHtml(u.email || '—')}</td>
            <td class="muted">${escapeHtml(u.phone || '—')}</td>
            <td>${u.subscription_active ? '<span class="tag tag-pro">Pro</span>' : '<span class="tag tag-free">Free</span>'}</td>
            <td class="muted">${formatDate(u.created_at)}</td>
          </tr>
        `).join('')}</tbody>
      </table>`;
    usersLoaded = true;
    const search = document.getElementById('users-search');
    search.addEventListener('input', () => {
      const q = search.value.trim().toLowerCase();
      wrap.querySelectorAll('tbody tr').forEach(tr => {
        tr.style.display = tr.textContent.toLowerCase().includes(q) ? '' : 'none';
      });
    });
  } catch (e) {
    document.getElementById('users-table-wrap').innerHTML = `<p class="empty">Ошибка: ${escapeHtml(e.message)}</p>`;
  }
}

let allEmails = [];
async function loadEmails() {
  try {
    const data = await adminFetch('GET', '/admin/users?limit=1000');
    const users = data.users || [];
    allEmails = users.filter(u => u.email).map(u => ({
      email: u.email,
      name: u.display_name || u.first_name || u.telegram_username || u.yandex_login || '',
      pro: !!u.subscription_active,
      created_at: u.created_at,
    }));
    renderEmails(allEmails);
    emailsLoaded = true;
    const search = document.getElementById('emails-search');
    search.addEventListener('input', () => {
      const q = search.value.trim().toLowerCase();
      renderEmails(allEmails.filter(e => e.email.toLowerCase().includes(q) || e.name.toLowerCase().includes(q)));
    });
  } catch (e) {
    document.getElementById('emails-table-wrap').innerHTML = `<p class="empty">Ошибка: ${escapeHtml(e.message)}</p>`;
  }
}

function renderEmails(list) {
  const wrap = document.getElementById('emails-table-wrap');
  if (list.length === 0) { wrap.innerHTML = '<p class="empty">Нет email</p>'; return; }
  wrap.innerHTML = `
    <table>
      <thead><tr>
        <th>Email</th><th>Имя / Логин</th><th>Статус</th><th>Регистрация</th>
      </tr></thead>
      <tbody>${list.map(e => `
        <tr>
          <td><a href="mailto:${escapeHtml(e.email)}" style="color:var(--accent-2);text-decoration:none;">${escapeHtml(e.email)}</a></td>
          <td>${escapeHtml(e.name || '—')}</td>
          <td>${e.pro ? '<span class="tag tag-pro">Pro</span>' : '<span class="tag tag-free">Free</span>'}</td>
          <td class="muted">${formatDate(e.created_at)}</td>
        </tr>
      `).join('')}</tbody>
    </table>`;
}

document.getElementById('copy-all-emails').addEventListener('click', () => {
  const text = allEmails.map(e => e.email).join(', ');
  navigator.clipboard.writeText(text).then(() => showToast('Все email скопированы'));
});
document.getElementById('copy-pro-emails').addEventListener('click', () => {
  const text = allEmails.filter(e => e.pro).map(e => e.email).join(', ');
  if (!text) { showToast('Нет Pro пользователей с email'); return; }
  navigator.clipboard.writeText(text).then(() => showToast('Pro email скопированы'));
});

// Overview
async function loadOverview() {
  try {
    const data = await adminFetch('GET', '/admin/overview');
    const m = data.metrics || {};
    const panel = document.getElementById('panel-overview');
    panel.innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:18px;">
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;">
          <div class="muted" style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;">Пользователей</div>
          <div style="font-size:22px;font-weight:700;">${m.users_total || 0}</div>
        </div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;">
          <div class="muted" style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;">Pro</div>
          <div style="font-size:22px;font-weight:700;">${m.users_pro || 0}</div>
        </div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;">
          <div class="muted" style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;">Новые за 30д</div>
          <div style="font-size:22px;font-weight:700;">${m.users_new_30d || 0}</div>
        </div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;">
          <div class="muted" style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;">Выручка, ₽</div>
          <div style="font-size:22px;font-weight:700;">${m.revenue_rub || 0}</div>
        </div>
      </div>
      <p class="muted" style="font-size:13px;">Выберите вкладку выше для просмотра деталей.</p>
    `;
  } catch (e) {
    document.getElementById('panel-overview').innerHTML = `<p class="empty">Ошибка загрузки: ${escapeHtml(e.message)}</p>`;
  }
}
loadOverview();
</script>
</body>
</html>
