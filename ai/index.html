<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' https://cdn.jsdelivr.net https://telegram.org; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://web-production-3cb7a.up.railway.app https://*.up.railway.app https://cdn.jsdelivr.net https://sistema-molodtsov.storage.yandexcloud.net https://*.storage.yandexcloud.net; media-src 'self' blob: data: https://web-production-3cb7a.up.railway.app https://*.up.railway.app https://sistema-molodtsov.storage.yandexcloud.net https://*.storage.yandexcloud.net; manifest-src 'self'; upgrade-insecure-requests" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
<title>AI-помощник — Система Молодцова</title>
  <link rel="stylesheet" href="/css/style.css?v=111" />
  <link rel="stylesheet" href="/css/nav.css?v=72" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body { background: #050506; }

    body.ai-chat-page .app-tabbar {
      display: none !important;
    }

    @media (max-width: 768px) {
    body.ai-chat-page .app-mobile-header {
      box-shadow: inset 0 1px 0 rgba(255,255,255,.13) !important;
      display: grid !important;
      grid-template-columns: 44px 1fr 44px;
      align-items: center;
      gap: 8px;
    }

    body.ai-chat-page .mobile-header-brand {
      grid-column: 2;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    body.ai-chat-page .mobile-header-actions {
      grid-column: 3;
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .ai-header-back {
      grid-column: 1;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,.82);
      border: 1px solid rgba(255,255,255,.16);
      background:
        radial-gradient(circle at 40% 20%, rgba(255,255,255,.18), transparent 52%),
        rgba(255,255,255,.06);
      text-decoration: none;
      flex-shrink: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .ai-header-back svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }
    }

    .ai-page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px 80px;
    }

    .ai-shell {
      width: 100%;
      max-width: 980px;
      min-height: min(760px, calc(100dvh - 140px));
      display: flex;
      flex-direction: column;
    }

    .ai-hero {
      text-align: center;
      margin-bottom: 28px;
    }

    .ai-kicker {
      color: rgba(255,255,255,.35);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2.4px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .ai-title {
      color: #fff;
      font-size: clamp(32px, 4.6vw, 56px);
      font-weight: 760;
      letter-spacing: -2px;
      line-height: 1.02;
      margin: 0 0 14px;
    }

    .ai-desc {
      max-width: 620px;
      margin: 0 auto;
      color: rgba(255,255,255,.52);
      font-size: 16px;
      line-height: 1.7;
    }

    .ai-usage-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 18px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.055);
      border: 1px solid rgba(255,255,255,.09);
      color: rgba(255,255,255,.62);
      font-size: 12px;
      font-weight: 600;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
    }

    .ai-chat-panel {
      min-height: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0;
      position: relative;
      overflow: visible;
    }

    .ai-chat-panel::before {
      display: none;
    }

    .ai-chat-panel > * {
      position: relative;
      z-index: 1;
    }

    .ai-conversation {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 18px;
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
      padding: 24px 0 22px;
      overflow-y: auto;
      min-height: 0;
    }

    .ai-message {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .ai-message.user {
      justify-content: flex-end;
    }

    .ai-bubble {
      max-width: min(560px, 82%);
      background: rgba(255,255,255,.055);
      border: 1px solid rgba(255,255,255,.085);
      border-radius: 18px;
      padding: 16px 18px;
      color: rgba(255,255,255,.78);
      font-size: 15px;
      line-height: 1.62;
      box-shadow:
        0 14px 34px rgba(0,0,0,.24),
        inset 0 1px 0 rgba(255,255,255,.06);
      white-space: pre-wrap;
    }

    .ai-message.user .ai-bubble {
      background: rgba(255,255,255,.075);
      color: rgba(255,255,255,.86);
      border-color: rgba(255,255,255,.10);
    }

    .ai-message.assistant.streaming .ai-bubble::after {
      content: '';
      display: inline-block;
      width: 7px;
      height: 1.1em;
      margin-left: 3px;
      vertical-align: -2px;
      border-radius: 999px;
      background: rgba(255,255,255,.62);
      animation: aiCursor 1s steps(2, start) infinite;
    }

    @keyframes aiCursor {
      50% { opacity: .15; }
    }

    .ai-name {
      display: block;
      color: rgba(255,255,255,.55);
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .ai-time {
      margin-left: 14px;
      color: rgba(255,255,255,.28);
      font-size: 12px;
      white-space: nowrap;
      align-self: flex-end;
      padding-bottom: 4px;
    }

    .ai-suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .ai-chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.055);
      color: rgba(255,255,255,.72);
      border-radius: 999px;
      padding: 8px 13px;
      font-size: 12px;
      text-decoration: none;
      transition: background .18s, color .18s, border-color .18s;
    }

    .ai-chip:hover {
      background: rgba(255,255,255,.095);
      color: #fff;
      border-color: rgba(255,255,255,.16);
    }

    .ai-input-bar {
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(5,5,6,.72);
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 24px;
      padding: 10px 12px 10px 18px;
      box-shadow:
        0 18px 50px rgba(0,0,0,.32),
        inset 0 1px 0 rgba(255,255,255,.06);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
    }

    .ai-input-bar input {
      flex: 1;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: rgba(255,255,255,.86);
      font: 500 15px/1.4 Inter, sans-serif;
      padding: 10px 0;
    }

    .ai-input-bar input::placeholder {
      color: rgba(255,255,255,.34);
    }

    .ai-tune,
    .ai-send {
      width: 38px;
      height: 38px;
      border: 0;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: transform .18s, opacity .18s, background .18s;
    }

    .ai-tune {
      background: rgba(255,255,255,.07);
      color: rgba(255,255,255,.62);
    }

    .ai-send {
      background: #fff;
      color: #050506;
    }

    .ai-tune:hover,
    .ai-send:hover {
      transform: translateY(-1px);
      opacity: .92;
    }

    .ai-footnote {
      text-align: center;
      color: rgba(255,255,255,.32);
      font-size: 12px;
      margin-top: 16px;
    }

    .ai-limit-actions {
      display: flex;
      margin-top: 14px;
    }

    .ai-limit-pro-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 0 14px;
      border-radius: 999px;
      background: #fff;
      color: #050506;
      text-decoration: none;
      font-size: 13px;
      font-weight: 800;
    }

    @media (max-width: 768px) {
      .ai-main { 
        max-width: none;
        width: 100%;
        min-height: 100svh;
        padding: 0;
        padding-bottom: 0;
        overflow: visible;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
      }
      .ai-page {
        width: 100%;
        height: var(--ai-viewport-height, 100svh);
        min-height: var(--ai-viewport-height, 100svh);
        padding: calc(112px + env(safe-area-inset-top, 0px)) 14px calc(var(--ai-composer-height, 74px) + var(--ai-keyboard-offset, 0px) + 18px + env(safe-area-inset-bottom, 0px));
        justify-content: flex-start;
        overflow: hidden;
      }
      .ai-shell {
        min-height: 0;
        height: 100%;
        max-width: 100%;
        display: flex;
        flex-direction: column;
      }
      .ai-hero {
        flex-shrink: 0;
        margin-bottom: 14px;
        transition: opacity .18s ease, transform .18s ease, max-height .18s ease, margin .18s ease;
      }
      .ai-kicker { margin-bottom: 10px; }
      .ai-hero .ai-title { font-size: clamp(22px, 7vw, 28px); margin-bottom: 8px; letter-spacing: -.9px; }
      .ai-hero .ai-desc { max-width: 21rem; font-size: 13px; line-height: 1.5; }
      .ai-hero .ai-usage-pill { margin-top: 12px; font-size: 11px; }
      .ai-chat-panel {
        flex: 1;
        min-height: 0;
        padding: 0;
        border-radius: 0;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        overflow: hidden;
      }
      .ai-conversation {
        flex: 1;
        min-height: 0;
        max-height: none;
        overflow-y: auto;
        padding: 52px 0 calc(var(--ai-composer-height, 74px) + var(--ai-keyboard-offset, 0px) + 28px);
        scroll-padding-bottom: calc(var(--ai-composer-height, 74px) + var(--ai-keyboard-offset, 0px) + 28px);
        overscroll-behavior: contain;
        -webkit-overflow-scrolling: touch;
      }
      .ai-input-bar {
        position: fixed;
        left: 14px;
        right: 14px;
        bottom: calc(var(--ai-keyboard-offset, 0px) + max(10px, env(safe-area-inset-bottom, 0px)));
        width: calc(100vw - 28px);
        max-width: none;
        margin: 0 auto;
        padding: 9px 10px 9px 14px;
        border-radius: 22px;
        z-index: 1200;
      }
      .ai-input-bar input { font-size: 16px; line-height: 1.35; padding: 9px 0; }
      .ai-tune,
      .ai-send { width: 36px; height: 36px; }
      .ai-footnote { display: none; }
      .ai-bubble { max-width: 88%; font-size: 14px; line-height: 1.55; padding: 14px 15px; border-radius: 16px; }
      .ai-message { gap: 8px; }
      .ai-time { display: none; }
      .ai-suggestions { gap: 6px; }
      .ai-chip { font-size: 11px; padding: 7px 11px; }
      body.ai-input-focused .ai-hero {
        opacity: 0;
        transform: translateY(-8px);
        max-height: 0;
        margin: 0;
        overflow: hidden;
        pointer-events: none;
      }
      body.ai-input-focused .ai-page,
      body.ai-has-messages .ai-page {
        padding-top: calc(112px + env(safe-area-inset-top, 0px));
      }

      body.ai-has-messages .ai-shell {
        height: 0;
        min-height: 0;
      }

      body.ai-has-messages .ai-chat-panel {
        position: fixed;
        top: calc(112px + env(safe-area-inset-top, 0px));
        left: 14px;
        right: 14px;
        bottom: calc(var(--ai-composer-height, 74px) + var(--ai-keyboard-offset, 0px) + 22px + env(safe-area-inset-bottom, 0px));
        z-index: 999;
        min-height: 0;
        overflow: visible;
        display: block;
      }

      body.ai-has-messages .ai-conversation {
        height: 100%;
        padding: 0 0 18px;
        margin: 0;
        max-width: none;
      }

      body.ai-has-messages .ai-hero {
        display: none;
        opacity: 0;
        transform: none;
        max-height: none;
        margin: 0;
        overflow: hidden;
        pointer-events: none;
      }

    }

    @media (min-width: 769px) {
      body.ai-chat-page .app-mobile-header {
        display: none !important;
        visibility: hidden !important;
        pointer-events: none !important;
      }

      .ai-main {
        height: 100svh;
        overflow: hidden;
      }

      .ai-page {
        height: 100svh;
        min-height: 100svh;
        justify-content: flex-start;
        padding: 40px 24px 36px;
        overflow: hidden;
      }

      .ai-shell {
        height: 100%;
        min-height: 0;
      }

      .ai-chat-panel {
        min-height: 0;
        flex: 1;
        justify-content: flex-end;
        overflow: hidden;
        padding-top: 8px;
      }

      .ai-conversation {
        flex: 1;
        min-height: 0;
        max-height: none;
        padding: 16px 0 22px;
        overflow-y: auto;
      }

      .ai-input-bar {
        flex: 0 0 auto;
      }

      .ai-footnote {
        flex: 0 0 auto;
      }
    }
  </style>
</head>
<body class="dark-theme ai-chat-page">
  <main class="main-content ai-main">
    <div class="ai-page">
      <div class="ai-shell">
        <div class="ai-hero">
          <div class="ai-kicker">AI-помощник</div>
          <h1 class="ai-title">AI-помощник<br>по материалам системы</h1>
          <p class="ai-desc">
            Помогает подобрать курс, найти практику и связать вопрос с материалами Системы Молодцова.
          </p>
          <div class="ai-usage-pill" id="ai-usage-pill">Войдите, чтобы использовать AI</div>
        </div>

        <section class="ai-chat-panel" aria-label="Чат с AI">
          <div class="ai-conversation" id="ai-conversation"></div>

          <div class="ai-input-bar">
            <input id="ai-input" type="text" placeholder="Задайте вопрос..." aria-label="Задайте вопрос" autocomplete="off">
            <button class="ai-tune" type="button" aria-label="Настройки">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 7h10M18 7h2M8 17h12M4 17h2"/><circle cx="16" cy="7" r="2"/><circle cx="8" cy="17" r="2"/></svg>
            </button>
            <button class="ai-send" type="button" aria-label="Отправить" id="ai-send">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
            </button>
          </div>

          <p class="ai-footnote">AI может ошибаться. Проверяйте важную информацию.</p>
        </section>
      </div>
    </div>
  </main>
  <script src="/js/config.js"></script>
  <script src="/js/api.js?v=56"></script>
  <script src="/js/auth.js?v=18"></script>
  <script src="/js/nav.js?v=79"></script>
  <script src="/js/ai-page.js?v=7"></script>
</body>
</html>
