<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Урок — Система Молодцова</title>
  <meta name="description" content="Просмотр урока" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js"></script>
  <style>
    .video-container { position: relative; }
    .watermark { position: absolute; top: 16px; left: 16px; z-index: 5; pointer-events: none; opacity: .55; }
    .watermark img { height: 28px; width: auto; filter: brightness(1.2); }
  </style>
</head>
<body class="dark-theme">

  <!-- Навигация -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="brand brand-outlined">
        <img src="assets/logo2.png" alt="Система Молодцова" class="brand-logo-img" />
      </a>
      
      <div class="nav-links desktop-only">
        <a href="courses.html" class="nav-link" style="color: var(--text-1);">Обучение</a>
        <a href="index.html#channels" class="nav-link">Каналы</a>
        <a href="index.html#support" class="nav-link">Поддержка</a>
      </div>

      <div class="nav-actions">
        <a href="https://t.me/obrazmisl" target="_blank" class="btn-nav-outline desktop-only">
          Вступить в клуб
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg>
        </a>
        <button id="nav-auth-btn" class="btn-nav-outline" onclick="window.openAuthModal('login')">
          Войти
        </button>
        <a id="nav-account-link" href="account.html" class="btn-nav-outline" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
        </a>
      </div>
    </div>
  </nav>

  <main class="main-content course-page">
    
    <!-- Кнопка назад -->
    <div class="back-link-container">
      <a href="courses.html" class="back-link back-link--glass">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Назад к курсам
      </a>
    </div>

    <div class="course-layout">
      <!-- Левая колонка: Плеер и описание -->
      <div class="course-main">
        <div class="video-container">
          <video id="course-video" controls preload="metadata">
            <source src="" type="video/mp4">
            Ваш браузер не поддерживает видео.
          </video>
          <div class="watermark"><img src="assets/logo2.png" alt=""></div>
        </div>

        <div class="course-author">
          <div class="course-author-avatar-wrap">
            <img src="assets/ruslan_promo.jpg" alt="" class="course-author-avatar" width="56" height="56" />
          </div>
          <span class="course-author-name">Руслан Молодцов</span>
        </div>
        
        <div class="course-details">
          <h1 id="course-title" class="course-title">Загрузка курса...</h1>
          <p id="course-desc" class="course-desc">Пожалуйста, подождите.</p>
        </div>

        <div class="lesson-info-block" id="lesson-info-block" style="display:none">
          <h2 class="lesson-title-main" id="lesson-title-main"></h2>
          <p class="lesson-desc-main" id="lesson-desc-main"></p>
          <div class="lesson-action-bar">
            <button class="lesson-action-btn" onclick="alert('Функция в разработке')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M20 6L9 17l-5-5"/></svg>
              Завершить эту программу
            </button>
          </div>
          <div class="lesson-resources">
            <div class="lesson-resource">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
              Заметки
            </div>
            <div class="lesson-resource">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
              Учебные материалы
            </div>
            <div class="lesson-resource">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
              Домашнее задание
            </div>
            <div class="lesson-resource">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
              Практическая работа
            </div>
          </div>
        </div>
      </div>

      <!-- Правая колонка: Список уроков -->
      <div class="course-sidebar">
        <div class="sidebar-header">
          <h3>Содержание курса</h3>
          <span id="course-lessons-count" class="lessons-count">0 уроков</span>
        </div>
        
        <div id="lessons-list" class="lessons-list">
          <!-- Уроки будут добавлены через JS -->
        </div>
      </div>
    </div>

  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-content">
      <div class="footer-brand">
        <img src="assets/logo2.png" alt="Система Молодцова" class="brand-logo-img small" />
      </div>
      <div class="footer-links">
        <a href="about.html">О сообществе</a>
        <a href="author.html">Об авторе</a>
      </div>
      <div class="footer-copy">
        2026 Все права защищены.
      </div>
    </div>
  </footer>

  <!-- iOS Glass Tab Bar (Mobile Only) -->
  <nav class="glass-tab-bar">
    <a href="index.html" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Главная</span>
    </a>
    <a href="courses.html" class="tab-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="3"/><path d="M8 21h8M12 17v4"/></svg>
      <span>Курсы</span>
    </a>
    <a href="subscription.html" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z"/></svg>
      <span>Подписка</span>
    </a>
    <a href="index.html#channels" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span>Каналы</span>
    </a>
  </nav>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/course.js"></script>
  <script>
    // Auth UI state
    window.refreshAuthUI = function(user) {
      const btn = document.getElementById('nav-auth-btn');
      const link = document.getElementById('nav-account-link');
      if (user || window.API.isLoggedIn()) {
        if (btn) btn.style.display = 'none';
        if (link) link.style.display = 'inline-flex';
      }
    };
    if (window.API.isLoggedIn()) {
      window.API.me().then(r => window.refreshAuthUI(r.user)).catch(() => {});
    }
  </script>
</body>
</html>
