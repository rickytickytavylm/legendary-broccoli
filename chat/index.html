  <link rel="icon" type="image/png" href="/assets/webp/logo2.webp" />
  <link rel="stylesheet" href="/css/style.css?v=115" />
  <link rel="stylesheet" href="/css/nav.css?v=74" />

</head>
<body class="dark-theme chat-page">
  <main class="chat-page-shell" data-chat-root>
    <section class="chat-panel">
      <header class="chat-panel-header">
        <a class="chat-back-button" href="/" aria-label="Назад">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
        </a>
        <div>
          <p class="chat-kicker">Сообщество</p>
          <h1>Общий чат</h1>
        </div>
        <div class="chat-live-dot" aria-hidden="true"></div>
      </header>

      <div class="chat-status" data-chat-status>Подключаемся…</div>

      <div class="chat-messages-wrap">
        <div class="chat-empty" data-chat-empty>
          <strong>Пока тихо</strong>
          <span>Напишите первое сообщение для теста общего чата.</span>
        </div>
        <div class="chat-messages" data-chat-messages></div>
      </div>

      <form class="chat-composer" data-chat-form>
        <input data-chat-input type="text" maxlength="3000" autocomplete="off" placeholder="Написать сообщение…" />
        <button data-chat-send type="submit" aria-label="Отправить">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        </button>
      </form>
    </section>
  </main>

  <script src="/js/config.js"></script>
  <script src="/js/api.js?v=60"></script>
  <script src="/js/nav.js?v=81"></script>
  <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.5/dist/socket.io.min.js"></script>
  <script src="/js/chat-page.js?v=2"></script>
</body>
</html>
