<!DOCTYPE html>
<html lang="ru">
<head>

  <link rel="manifest" href="/manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Система" />
  <link rel="apple-touch-icon" href="/assets/logo2.png" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
  <meta name="theme-color" content="#030605" />
  <meta name="color-scheme" content="dark" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' https://cdn.jsdelivr.net https://telegram.org; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://api.sistema-molodtsov.ru wss://api.sistema-molodtsov.ru https://web-production-3cb7a.up.railway.app wss://web-production-3cb7a.up.railway.app https://*.up.railway.app wss://*.up.railway.app https://cdn.jsdelivr.net https://sistema-molodtsov.storage.yandexcloud.net https://*.storage.yandexcloud.net; media-src 'self' blob: data: https://web-production-3cb7a.up.railway.app https://*.up.railway.app https://sistema-molodtsov.storage.yandexcloud.net https://*.storage.yandexcloud.net; manifest-src 'self'; upgrade-insecure-requests" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>Общий чат — Система Молодцова</title>
  <link rel="icon" type="image/png" href="/assets/webp/logo2.webp" />
  <link rel="stylesheet" href="/css/style.css?v=123" />
  <link rel="stylesheet" href="/css/nav.css?v=76" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
</head>
<body class="dark-theme chat-page">
  <main class="chat-page-shell" data-chat-root>
    <section class="chat-panel">
      <div class="chat-status" data-chat-status>Подключаемся…</div>

      <!-- Notification Permission Prompt Banner -->
      <div class="notification-prompt-banner hidden" id="notification-banner">
        <div class="notification-banner-content">
          <div class="notification-banner-text">
            <strong>Включить push-уведомления?</strong>
            <span>Получайте мгновенные ответы на заблокированный экран.</span>
          </div>
          <div class="notification-banner-buttons">
            <button class="banner-btn-decline" id="notification-decline-btn">Позже</button>
            <button class="banner-btn-accept" id="notification-accept-btn">Включить</button>
          </div>
        </div>
      </div>

      <div class="chat-messages-wrap">
        <div class="chat-empty hidden" data-chat-empty>
          <strong>Пока тихо</strong>
          <span>Напишите первое сообщение для теста общего чата.</span>
        </div>
        <div class="chat-messages" data-chat-messages></div>
      </div>

      <form class="chat-composer" data-chat-form>
        <button class="chat-media-trigger" type="button" id="chat-voice-rec-btn" aria-label="Записать голосовое">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1M12 19v4M8 23h8"/></svg>
        </button>
        <button class="chat-media-trigger" type="button" id="chat-video-rec-btn" aria-label="Записать кружочек">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><path d="M12 2a10 10 0 0 1 10 10c0 1.25-.5 2.5-1.5 3.5l-2.5-2.5"/></svg>
        </button>
        
        <textarea data-chat-input rows="1" maxlength="3000" placeholder="Написать..." spellcheck="false" autocomplete="off" autocapitalize="sentences"></textarea>
        
        <button data-chat-send type="submit" aria-label="Отправить">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        </button>
      </form>

      <!-- Media Recording Overlay -->
      <div id="chat-rec-overlay" class="chat-rec-overlay hidden">
        <div class="rec-overlay-body">
          <div class="rec-circular-preview-container hidden" id="rec-video-preview-wrap">
            <video id="rec-video-preview" autoplay playsinline muted></video>
          </div>
          <div class="rec-status-wrap">
            <span class="rec-dot"></span>
            <span id="rec-timer">00:00</span>
          </div>
          <div class="rec-actions">
            <button type="button" class="rec-btn rec-cancel-btn" id="rec-cancel-btn">Отмена</button>
            <button type="button" class="rec-btn rec-stop-btn" id="rec-stop-btn">Готово</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="/js/config.js"></script>
  <script src="/js/api.js?v=67"></script>
  <script src="/js/nav.js?v=87"></script>
  <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.5/dist/socket.io.min.js"></script>
  <script src="/js/chat-page.js?v=12"></script>
</body>
</html>
