<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://telegram.org; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://web-production-3cb7a.up.railway.app https://*.up.railway.app https://cdn.jsdelivr.net https://sistema-molodtsov.storage.yandexcloud.net https://*.storage.yandexcloud.net; media-src 'self' blob: data: https://web-production-3cb7a.up.railway.app https://*.up.railway.app https://sistema-molodtsov.storage.yandexcloud.net https://*.storage.yandexcloud.net; manifest-src 'self'; upgrade-insecure-requests" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>Сессии с психологом — Система Молодцова</title>
  <link rel="icon" type="image/png" href="/assets/webp/logo2.webp" />
  <link rel="stylesheet" href="/css/style.css?v=44" />
  <link rel="stylesheet" href="/css/nav.css?v=55" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body class="dark-theme sessions-page">
  <main class="main-content sessions-main">
    <section class="sessions-hero">
      <p class="hub-kicker">Сессии</p>
      <h1>Сессия с психологом</h1>
      <p>Выберите специалиста, оставьте удобный контакт, и команда заботы свяжется с вами для согласования времени.</p>
    </section>

    <section class="sessions-grid" id="sessions-grid"></section>
  </main>

  <div class="session-modal" id="session-modal" aria-hidden="true">
    <div class="session-modal-card">
      <button class="session-modal-close" type="button" id="session-close" aria-label="Закрыть">×</button>
      <p class="hub-kicker">Запись</p>
      <h2 id="session-modal-title">Сессия с психологом</h2>
      <form id="session-form" class="session-form">
        <input type="hidden" name="specialist_slug" id="session-specialist-slug" />
        <input type="hidden" name="specialist_name" id="session-specialist-name" />
        <label>
          <span>Ваше имя</span>
          <input name="client_name" type="text" placeholder="Как к вам обращаться" />
        </label>
        <div class="session-methods" role="radiogroup" aria-label="Способ связи">
          <label><input type="radio" name="contact_method" value="phone" checked /> Звонок</label>
          <label><input type="radio" name="contact_method" value="telegram" /> Telegram</label>
          <label><input type="radio" name="contact_method" value="max" /> MAX</label>
        </div>
        <label>
          <span id="session-contact-label">Телефон</span>
          <input name="contact_value" id="session-contact" type="text" placeholder="+7..." required />
        </label>
        <label>
          <span>Комментарий</span>
          <textarea name="comment" placeholder="Коротко опишите запрос или удобное время"></textarea>
        </label>
        <button class="btn btn-primary btn-lg" type="submit">Отправить заявку</button>
        <p class="session-form-status" id="session-status"></p>
      </form>
    </div>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/api.js?v=43"></script>
  <script src="/js/auth.js?v=18"></script>
  <script src="/js/nav.js?v=59"></script>
  <script src="/js/main.js?v=2"></script>
  <script src="/js/sessions.js?v=1"></script>
  <script>
    const grid = document.getElementById('sessions-grid');
    const modal = document.getElementById('session-modal');
    const form = document.getElementById('session-form');
    const statusEl = document.getElementById('session-status');
    const contact = document.getElementById('session-contact');
    const contactLabel = document.getElementById('session-contact-label');

    grid.innerHTML = window.SESSION_SPECIALISTS.map((item) => `
      <article class="specialist-card">
        <div class="specialist-photo"><img src="${item.image}" alt="${item.name}" loading="lazy" decoding="async" /></div>
        <div class="specialist-body">
          <h2>${item.name}</h2>
          <p>${item.experience}</p>
          <ul>${item.bullets.map((bullet) => `<li>${bullet}</li>`).join('')}</ul>
          <button class="specialist-action" type="button" data-slug="${item.slug}">Записаться</button>
        </div>
      </article>
    `).join('');

    function openModal(specialist) {
      document.getElementById('session-modal-title').textContent = `Запись: ${specialist.name}`;
      document.getElementById('session-specialist-slug').value = specialist.slug;
      document.getElementById('session-specialist-name').value = specialist.name;
      statusEl.textContent = '';
      modal.classList.add('visible');
      modal.setAttribute('aria-hidden', 'false');
    }

    function closeModal() {
      modal.classList.remove('visible');
      modal.setAttribute('aria-hidden', 'true');
    }

    grid.addEventListener('click', (event) => {
      const button = event.target.closest('[data-slug]');
      if (!button) return;
      const specialist = window.SESSION_SPECIALISTS.find((item) => item.slug === button.dataset.slug);
      if (specialist) openModal(specialist);
    });

    document.getElementById('session-close').addEventListener('click', closeModal);
    modal.addEventListener('click', (event) => {
      if (event.target === modal) closeModal();
    });

    Array.from(form.elements.contact_method).forEach((radio) => {
      radio.addEventListener('change', () => {
        if (radio.value === 'phone' && radio.checked) {
          contactLabel.textContent = 'Телефон';
          contact.placeholder = '+7...';
        } else if (radio.value === 'telegram' && radio.checked) {
          contactLabel.textContent = 'Ник в Telegram';
          contact.placeholder = '@username';
        } else if (radio.value === 'max' && radio.checked) {
          contactLabel.textContent = 'Ник или телефон в MAX';
          contact.placeholder = 'MAX контакт';
        }
      });
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      statusEl.textContent = 'Отправляем...';
      const payload = Object.fromEntries(new FormData(form).entries());
      payload.source = 'sessions_page';
      try {
        await window.API.request('POST', '/sessions/requests', payload);
        statusEl.textContent = 'Заявка отправлена. Мы свяжемся с вами.';
        form.reset();
        window.setTimeout(closeModal, 900);
      } catch (err) {
        statusEl.textContent = err.message || 'Не удалось отправить заявку';
      }
    });
  </script>
</body>
</html>
