<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' https://cdn.jsdelivr.net https://telegram.org; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://web-production-3cb7a.up.railway.app https://*.up.railway.app https://cdn.jsdelivr.net https://sistema-molodtsov.storage.yandexcloud.net https://*.storage.yandexcloud.net; media-src 'self' blob: data: https://web-production-3cb7a.up.railway.app https://*.up.railway.app https://sistema-molodtsov.storage.yandexcloud.net https://*.storage.yandexcloud.net; manifest-src 'self'; upgrade-insecure-requests" />

  <title>Shorts — Система Молодцова</title>
  <link rel="stylesheet" href="/css/style.css?v=108" />
  <link rel="stylesheet" href="/css/nav.css?v=71" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box}

    .shorts-page {
      min-height: 100vh;
      background: #050506;
      padding: 100px 20px 120px;
      font-family: 'Inter', sans-serif;
    }

    .shorts-header {
      text-align: center;
      margin-bottom: 48px;
    }

    .shorts-header h1 {
      color: #fff;
      font-size: clamp(32px, 5vw, 48px);
      font-weight: 800;
      letter-spacing: -1.5px;
      margin: 0 0 12px;
    }

    .shorts-header p {
      color: rgba(255,255,255,.4);
      font-size: 16px;
      font-weight: 400;
      margin: 0;
      letter-spacing: 0.2px;
    }

    .masonry {
      max-width: 960px;
      margin: 0 auto;
      columns: 2;
      column-gap: 16px;
    }

    @media (min-width: 768px) {
      .masonry {
        columns: 3;
        column-gap: 20px;
      }
      .shorts-page {
        padding: 120px 32px 120px;
      }
    }

    button.short-card {
      appearance: none;
      margin: 0;
      padding: 0;
      border: none;
      font: inherit;
      cursor: pointer;
      text-align: left;
      color: inherit;
    }

    .short-card {
      break-inside: avoid;
      margin-bottom: 16px;
      display: inline-block;
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.07);
      transition: transform .3s ease, border-color .3s ease, box-shadow .3s ease;
    }

    @media (min-width: 768px) {
      .short-card { margin-bottom: 20px; }
    }

    button.short-card:hover,
    button.short-card:focus-visible {
      transform: translateY(-4px);
      border-color: rgba(255,255,255,.15);
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
      outline: none;
    }

    .short-card__poster {
      position: relative;
      overflow: hidden;
      display: block;
      background: rgba(255,255,255,.03);
    }

    .short-card__poster img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .short-card--9x16 .short-card__poster { aspect-ratio: 9/16; }

    .short-card__overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(5,5,6,.1) 0%,
        rgba(5,5,6,.55) 100%
      );
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .3s ease;
      pointer-events: none;
    }

    button.short-card:hover .short-card__overlay,
    button.short-card:focus-visible .short-card__overlay {
      background: linear-gradient(
        180deg,
        rgba(5,5,6,.05) 0%,
        rgba(5,5,6,.4) 100%
      );
    }

    .short-card__play {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(255,255,255,.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,.18);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .3s ease, transform .3s ease;
    }

    button.short-card:hover .short-card__play,
    button.short-card:focus-visible .short-card__play {
      background: rgba(255,255,255,.22);
      transform: scale(1.1);
    }

    .short-card__play svg {
      width: 22px;
      height: 22px;
      color: #fff;
      margin-left: 2px;
    }

    .short-card__caption {
      padding: 14px 16px 16px;
      display: block;
    }

    .short-card__caption span {
      color: rgba(255,255,255,.72);
      font-size: 13px;
      font-weight: 500;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 5;
      overflow: hidden;
    }

    .short-card__duration {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,.8);
      letter-spacing: 0.3px;
      z-index: 2;
    }

    button.short-card.short-card--busy {
      opacity: 0.76;
      pointer-events: none;
    }

    .shorts-toast {
      position: fixed;
      left: max(16px, env(safe-area-inset-left));
      right: max(16px, env(safe-area-inset-right));
      bottom: max(100px, calc(16px + env(safe-area-inset-bottom)));
      z-index: 4000;
      max-width: min(420px, 100%);
      margin-inline: auto;
      padding: 14px 18px;
      border-radius: 16px;
      background: rgba(12, 14, 22, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 16px 44px rgba(0, 0, 0, 0.55);
      font-size: 14px;
      line-height: 1.45;
      color: rgba(255, 255, 255, 0.92);
      opacity: 0;
      transform: translateY(14px);
      pointer-events: none;
      transition:
        opacity 0.22s ease,
        transform 0.22s ease;
    }

    .shorts-toast.shorts-toast--visible {
      opacity: 1;
      transform: translateY(0);
    }

    .shorts-page-error {
      color: rgba(255,255,255,.52);
      text-align: center;
      padding: 40px 20px;
    }

    body.shorts-player-open {
      overflow: hidden;
    }

    /* Полноэкранный вертикальный режим как в Shorts/Reels — без touch-action:none (ломало тапы по controls на iOS)
       Важно: не полагаться только на .u-hidden — здесь есть display:flex, он перебивает глобальный .u-hidden. */
    .shorts-player-overlay {
      position: fixed;
      inset: 0;
      z-index: 2500;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    .shorts-player-overlay.u-hidden {
      display: none !important;
      visibility: hidden;
      pointer-events: none;
    }

    .shorts-player-topbar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: env(safe-area-inset-top, 0);
      padding-bottom: 8px;
      padding-inline: max(12px, env(safe-area-inset-left)) max(12px, env(safe-area-inset-right));
      position: relative;
      z-index: 4;
    }

    .shorts-player-dismiss {
      appearance: none;
      margin: 0;
      padding: 0;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .shorts-player-dismiss:hover,
    .shorts-player-dismiss:focus-visible {
      background: rgba(255, 255, 255, 0.2);
      outline: none;
    }

    .shorts-player-dismiss:active {
      transform: scale(0.96);
    }

    .shorts-player-dismiss svg {
      width: 26px;
      height: 26px;
      display: block;
    }

    .shorts-player-stage {
      flex: 1;
      min-height: 0;
      position: relative;
      width: 100%;
      background: #000;
    }

    .shorts-player-poster {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: 0;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.18s ease;
    }

    .shorts-player-poster.is-visible {
      opacity: 1;
      visibility: visible;
    }

    .shorts-player-spinner {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.35);
    }

    .shorts-player-spinner.is-visible {
      display: flex;
    }

    .shorts-player-spinner span {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.22);
      border-top-color: rgba(255, 255, 255, 0.9);
      animation: shorts-spin 0.8s linear infinite;
    }

    @keyframes shorts-spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Вертикально «во весь экран»: под шапкой с кнопкой; contain — без обрезки кадра */
    .shorts-player-stage video {
      position: absolute;
      inset: 0;
      z-index: 3;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    .shorts-player-foot {
      flex: 0 0 auto;
      padding-bottom: max(14px, env(safe-area-inset-bottom));
      padding-inline: max(16px, env(safe-area-inset-left)) max(16px, env(safe-area-inset-right));
    }

    .shorts-player-title {
      margin: 0;
      font-size: 14px;
      font-weight: 600;
      line-height: 1.38;
      color: rgba(255, 255, 255, 0.92);
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.75);
      max-height: 4.3em;
      overflow: hidden;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 3;
    }
  </style>
</head>
<body class="dark-theme">
  <main>
    <div class="shorts-page">
      <div class="shorts-header">
        <h1>Shorts</h1>
        <p>Короткие видео с ключевыми идеями</p>
      </div>

      <div class="masonry" id="shorts-grid" aria-busy="true"></div>
    </div>

    <div id="shorts-player-overlay" class="shorts-player-overlay u-hidden" aria-hidden="true">
      <div class="shorts-player-topbar">
        <button
          type="button"
          class="shorts-player-dismiss"
          data-shorts-player-close
          aria-label="Закрыть"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <path d="M6 10l6 6 6-6" />
          </svg>
        </button>
      </div>
      <div class="shorts-player-stage" id="shorts-player-stage">
        <img id="shorts-player-poster" class="shorts-player-poster" alt="" />
        <div id="shorts-player-spinner" class="shorts-player-spinner" aria-hidden="true">
          <span></span>
        </div>
        <video id="shorts-player-video" controls playsinline webkit-playsinline></video>
      </div>
      <footer class="shorts-player-foot">
        <p id="shorts-player-title" class="shorts-player-title"></p>
      </footer>
    </div>

    <div id="shorts-toast" class="shorts-toast" aria-live="polite"></div>
  </main>

  <script src="/js/config.js"></script>
  <script src="/js/api.js?v=57"></script>
  <script src="/js/auth.js?v=18"></script>
  <script src="/js/nav.js?v=78"></script>
  <script src="/js/shorts-page.js?v=6"></script>
</body>
</html>
