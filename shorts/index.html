<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />

  <title>Shorts — Система Молодцова</title>
  <link rel="stylesheet" href="/css/style.css?v=108" />
  <link rel="stylesheet" href="/css/nav.css?v=71" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box}

    .shorts-page {
      min-height: 100vh;
      background: #050506;
      padding: 100px 20px 120px;
      font-family: 'Inter', sans-serif;
    }

    .shorts-header {
      text-align: center;
      margin-bottom: 48px;
    }

    .shorts-header h1 {
      color: #fff;
      font-size: clamp(32px, 5vw, 48px);
      font-weight: 800;
      letter-spacing: -1.5px;
      margin: 0 0 12px;
    }

    .shorts-header p {
      color: rgba(255,255,255,.4);
      font-size: 16px;
      font-weight: 400;
      margin: 0;
      letter-spacing: 0.2px;
    }

    .masonry {
      max-width: 960px;
      margin: 0 auto;
      columns: 2;
      column-gap: 16px;
    }

    @media (min-width: 768px) {
      .masonry {
        columns: 3;
        column-gap: 20px;
      }
      .shorts-page {
        padding: 120px 32px 120px;
      }
    }

    button.short-card {
      appearance: none;
      margin: 0;
      padding: 0;
      border: none;
      font: inherit;
      cursor: pointer;
      text-align: left;
      color: inherit;
    }

    .short-card {
      break-inside: avoid;
      margin-bottom: 16px;
      display: inline-block;
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.07);
      transition: transform .3s ease, border-color .3s ease, box-shadow .3s ease;
    }

    @media (min-width: 768px) {
      .short-card { margin-bottom: 20px; }
    }

    button.short-card:hover,
    button.short-card:focus-visible {
      transform: translateY(-4px);
      border-color: rgba(255,255,255,.15);
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
      outline: none;
    }

    .short-card__poster {
      position: relative;
      overflow: hidden;
      display: block;
      background: rgba(255,255,255,.03);
    }

    .short-card__poster img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .short-card--9x16 .short-card__poster { aspect-ratio: 9/16; }

    .short-card__overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(5,5,6,.1) 0%,
        rgba(5,5,6,.55) 100%
      );
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .3s ease;
      pointer-events: none;
    }

    button.short-card:hover .short-card__overlay,
    button.short-card:focus-visible .short-card__overlay {
      background: linear-gradient(
        180deg,
        rgba(5,5,6,.05) 0%,
        rgba(5,5,6,.4) 100%
      );
    }

    .short-card__play {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(255,255,255,.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,.18);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .3s ease, transform .3s ease;
    }

    button.short-card:hover .short-card__play,
    button.short-card:focus-visible .short-card__play {
      background: rgba(255,255,255,.22);
      transform: scale(1.1);
    }

    .short-card__play svg {
      width: 22px;
      height: 22px;
      color: #fff;
      margin-left: 2px;
    }

    .short-card__caption {
      padding: 14px 16px 16px;
      display: block;
    }

    .short-card__caption span {
      color: rgba(255,255,255,.72);
      font-size: 13px;
      font-weight: 500;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 5;
      overflow: hidden;
    }

    .short-card__duration {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,.8);
      letter-spacing: 0.3px;
      z-index: 2;
    }

    .shorts-page-error {
      color: rgba(255,255,255,.52);
      text-align: center;
      padding: 40px 20px;
    }

    body.shorts-player-open {
      overflow: hidden;
      touch-action: none;
    }

    .shorts-player-overlay {
      position: fixed;
      inset: 0;
      z-index: 2500;
      background: rgba(5, 5, 6, 0.94);
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: center;
      padding:
        calc(52px + env(safe-area-inset-top))
        max(14px, env(safe-area-inset-right))
        calc(24px + env(safe-area-inset-bottom))
        max(14px, env(safe-area-inset-left));
    }

    .shorts-player-head {
      flex: 0 0 auto;
      margin-bottom: 12px;
    }

    .shorts-player-title {
      margin: 0;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.35;
      color: rgba(255,255,255,.78);
      max-height: 3.9em;
      overflow: hidden;
    }

    .shorts-player-wrap {
      flex: 0 1 auto;
      max-height: calc(100dvh - 160px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .shorts-player-wrap video {
      width: 100%;
      max-width: min(100%, 560px);
      max-height: 100%;
      border-radius: 14px;
      background: #000;
    }

    .shorts-player-close {
      position: absolute;
      top: max(14px, env(safe-area-inset-top));
      right: max(14px, env(safe-area-inset-right));
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.09);
      color: #fff;
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
      display: grid;
      place-items: center;
      z-index: 2;
    }

    .shorts-player-close:hover {
      background: rgba(255,255,255,.16);
    }
  </style>
</head>
<body class="dark-theme">
  <main>
    <div class="shorts-page">
      <div class="shorts-header">
        <h1>Shorts</h1>
        <p>Короткие видео с ключевыми идеями</p>
      </div>

      <div class="masonry" id="shorts-grid" aria-busy="true"></div>
    </div>

    <div id="shorts-player-overlay" class="shorts-player-overlay u-hidden" aria-hidden="true">
      <button type="button" class="shorts-player-close" data-shorts-player-close aria-label="Закрыть">×</button>
      <div class="shorts-player-head">
        <p id="shorts-player-title" class="shorts-player-title"></p>
      </div>
      <div class="shorts-player-wrap">
        <video id="shorts-player-video" controls playsinline></video>
      </div>
    </div>
  </main>

  <script src="/js/config.js"></script>
  <script src="/js/api.js?v=56"></script>
  <script src="/js/auth.js?v=18"></script>
  <script src="/js/nav.js?v=76"></script>
  <script src="/js/shorts-page.js?v=1"></script>
</body>
</html>
