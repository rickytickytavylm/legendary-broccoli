<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' https://cdn.jsdelivr.net https://telegram.org; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://web-production-3cb7a.up.railway.app https://*.up.railway.app https://cdn.jsdelivr.net https://sistema-molodtsov.storage.yandexcloud.net https://*.storage.yandexcloud.net; media-src 'self' blob: data: https://web-production-3cb7a.up.railway.app https://*.up.railway.app https://sistema-molodtsov.storage.yandexcloud.net https://*.storage.yandexcloud.net; manifest-src 'self'; upgrade-insecure-requests" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>Shorts — Система Молодцова</title>
  <link rel="stylesheet" href="/css/style.css?v=110" />
  <link rel="stylesheet" href="/css/nav.css?v=73" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box}

    html.shorts-input-cooldown #shorts-grid button.short-card {
      pointer-events: none;
    }

    body.shorts-page {
      background: #050506;
      font-family: 'Inter', sans-serif;
    }

    body.shorts-page .shorts-after-hero {
      padding-bottom: clamp(104px, 22vw, 128px);
    }

    /* Как сообщество: лишний верхний отступ у области сетки после hero */
    @media (max-width: 620px) {
      body.shorts-page .shorts-after-hero.ux-page-shell {
        padding-top: clamp(12px, 3.2vw, 20px);
      }
    }

    @media (min-width: 621px) {
      body.shorts-page .shorts-after-hero {
        padding-top: clamp(14px, 3.5vw, 26px);
      }
    }

    .masonry {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      max-width: 1080px;
      margin-inline: auto;
      width: 100%;
    }

    @media (min-width: 900px) {
      .masonry {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: clamp(14px, 2vw, 22px);
        max-width: 1140px;
      }
    }

    @media (min-width: 1200px) {
      .masonry {
        max-width: min(1180px, calc(100vw - 232px - 72px));
      }
    }

    button.short-card {
      appearance: none;
      margin: 0;
      padding: 0;
      border: none;
      font: inherit;
      cursor: pointer;
      text-align: left;
      color: inherit;
    }

    .short-card {
      break-inside: avoid;
      margin-bottom: 0;
      display: block;
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.07);
      transition: transform .3s ease, border-color .3s ease, box-shadow .3s ease;
    }

    button.short-card:hover,
    button.short-card:focus-visible {
      transform: translateY(-4px);
      border-color: rgba(255,255,255,.15);
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
      outline: none;
    }

    .short-card__poster {
      position: relative;
      overflow: hidden;
      display: block;
      background: rgba(255,255,255,.03);
    }

    .short-card__poster img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .short-card--9x16 .short-card__poster { aspect-ratio: 9/16; }

    .short-card__overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(5,5,6,.1) 0%,
        rgba(5,5,6,.55) 100%
      );
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .3s ease;
      pointer-events: none;
    }

    button.short-card:hover .short-card__overlay,
    button.short-card:focus-visible .short-card__overlay {
      background: linear-gradient(
        180deg,
        rgba(5,5,6,.05) 0%,
        rgba(5,5,6,.4) 100%
      );
    }

    .short-card__play {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(255,255,255,.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,.18);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .3s ease, transform .3s ease;
    }

    button.short-card:hover .short-card__play,
    button.short-card:focus-visible .short-card__play {
      background: rgba(255,255,255,.22);
      transform: scale(1.1);
    }

    .short-card__play svg {
      width: 22px;
      height: 22px;
      color: #fff;
      margin-left: 2px;
    }

    .short-card__caption {
      padding: 14px 16px 16px;
      display: block;
    }

    .short-card__caption span {
      color: rgba(255,255,255,.72);
      font-size: 13px;
      font-weight: 500;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 5;
      overflow: hidden;
    }

    .short-card__duration {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,.8);
      letter-spacing: 0.3px;
      z-index: 2;
    }

    button.short-card.short-card--busy {
      opacity: 0.76;
      pointer-events: none;
    }

    .shorts-toast {
      position: fixed;
      left: max(16px, env(safe-area-inset-left));
      right: max(16px, env(safe-area-inset-right));
      bottom: max(100px, calc(16px + env(safe-area-inset-bottom)));
      z-index: 4000;
      max-width: min(420px, 100%);
      margin-inline: auto;
      padding: 14px 18px;
      border-radius: 16px;
      background: rgba(12, 14, 22, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 16px 44px rgba(0, 0, 0, 0.55);
      font-size: 14px;
      line-height: 1.45;
      color: rgba(255, 255, 255, 0.92);
      opacity: 0;
      transform: translateY(14px);
      pointer-events: none;
      transition:
        opacity 0.22s ease,
        transform 0.22s ease;
    }

    .shorts-toast.shorts-toast--visible {
      opacity: 1;
      transform: translateY(0);
    }

    .shorts-page-error {
      color: rgba(255,255,255,.52);
      text-align: center;
      padding: 40px 20px;
    }

    body.shorts-player-open {
      overflow: hidden;
    }

    /* Полноэкранный вертикальный режим как в Shorts/Reels — без touch-action:none (ломало тапы по controls на iOS)
       Важно: не полагаться только на .u-hidden — здесь есть display:flex, он перебивает глобальный .u-hidden. */
    .shorts-player-overlay {
      position: fixed;
      inset: 0;
      z-index: 2500;
      background:
        radial-gradient(ellipse 115% 90% at 50% 40%, rgba(24, 28, 40, 0.35) 0%, transparent 55%),
        #020203;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    .shorts-player-overlay.u-hidden {
      display: none !important;
      visibility: hidden;
      pointer-events: none;
    }

    .shorts-player-topbar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: calc(env(safe-area-inset-top, 0px) + 28px);
      padding-bottom: 12px;
      padding-inline: max(12px, env(safe-area-inset-left)) max(12px, env(safe-area-inset-right));
      position: relative;
      z-index: 4;
      background: linear-gradient(
        180deg,
        rgba(5, 6, 10, 0.95) 0%,
        rgba(5, 6, 10, 0.55) 55%,
        transparent 100%
      );
      pointer-events: none;
    }

    .shorts-player-topbar .shorts-player-dismiss {
      pointer-events: auto;
    }

    .shorts-player-dismiss {
      appearance: none;
      margin: 14px 0 0;
      padding: 0;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow:
        0 4px 24px rgba(0, 0, 0, 0.45),
        inset 0 1px 0 rgba(255, 255, 255, 0.12);
      color: #fff;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: background 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
    }

    .shorts-player-dismiss:hover,
    .shorts-player-dismiss:focus-visible {
      background: rgba(255, 255, 255, 0.18);
      border-color: rgba(255, 255, 255, 0.32);
      outline: none;
    }

    .shorts-player-dismiss:active {
      transform: scale(0.96);
    }

    .shorts-player-dismiss svg {
      width: 26px;
      height: 26px;
      display: block;
    }

    .shorts-player-stage {
      flex: 1;
      min-height: 0;
      position: relative;
      width: 100%;
      background: #000;
    }

    .shorts-player-poster {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: 0;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.18s ease;
    }

    .shorts-player-poster.is-visible {
      opacity: 1;
      visibility: visible;
    }

    .shorts-player-spinner {
      position: absolute;
      inset: 0;
      z-index: 8;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.35);
    }

    .shorts-player-spinner.is-visible {
      display: flex;
    }

    .shorts-player-spinner span {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.22);
      border-top-color: rgba(255, 255, 255, 0.9);
      animation: shorts-spin 0.8s linear infinite;
    }

    @keyframes shorts-spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Вертикально «во весь экран»: под шапкой с кнопкой; contain — без обрезки кадра */
    .shorts-player-stage video {
      position: absolute;
      inset: 0;
      z-index: 3;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
      border-radius: 2px;
    }

    /* Краевая матовка поверх видео: усиливает кадр, не блокирует тапы (pointer-events: none) */
    .shorts-player-vignette {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.42) 0%, transparent 22%),
        linear-gradient(
          90deg,
          rgba(0, 0, 0, 0.55) 0%,
          transparent 14%,
          transparent 86%,
          rgba(0, 0, 0, 0.55) 100%
        ),
        linear-gradient(0deg, rgba(0, 0, 0, 0.18) 0%, transparent min(120px, 22%));
    }

    .shorts-player-foot {
      flex: 0 0 auto;
      position: relative;
      z-index: 6;
      padding-top: clamp(48px, 14vw, 72px);
      padding-bottom: max(14px, env(safe-area-inset-bottom));
      padding-inline: max(16px, env(safe-area-inset-left)) max(16px, env(safe-area-inset-right));
      margin-top: -56px;
      background: linear-gradient(
        180deg,
        transparent 0%,
        rgba(0, 0, 0, 0.72) min(140px, 38%),
        rgba(2, 2, 3, 0.92) 100%
      );
    }

    .shorts-player-title {
      margin: 0;
      font-size: 14px;
      font-weight: 600;
      line-height: 1.42;
      letter-spacing: -0.01em;
      color: rgba(255, 255, 255, 0.94);
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.6);
      max-height: 4.3em;
      overflow: hidden;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 3;
      padding: 13px 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow:
        0 12px 40px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }
  </style>
</head>
<body class="dark-theme ux-route-page shorts-page">
  <main class="main-content">
    <section class="hero hero-courses" style="background:linear-gradient(to bottom, rgba(0,0,0,.24) 0%, rgba(0,0,0,.82) 74%, var(--bg-main) 100%), url('/assets/webp/shorts_hero.webp') center/cover no-repeat;">
      <div class="hero-content text-left">
        <p class="hub-kicker fade-up">Видео</p>
        <h1 class="hero-title fade-up">Shorts</h1>
        <p class="hero-subtitle fade-up">Короткие видео с ключевыми идеями</p>
      </div>
    </section>

    <div class="ux-page-shell shorts-after-hero">
      <div class="masonry" id="shorts-grid" aria-busy="true"></div>
    </div>

    <div id="shorts-player-overlay" class="shorts-player-overlay u-hidden" aria-hidden="true">
      <div class="shorts-player-topbar">
        <button
          type="button"
          class="shorts-player-dismiss"
          data-shorts-player-close
          aria-label="Закрыть"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <path d="M6 10l6 6 6-6" />
          </svg>
        </button>
      </div>
      <div class="shorts-player-stage" id="shorts-player-stage">
        <img id="shorts-player-poster" class="shorts-player-poster" alt="" />
        <div id="shorts-player-spinner" class="shorts-player-spinner" aria-hidden="true">
          <span></span>
        </div>
        <video id="shorts-player-video" controls playsinline webkit-playsinline></video>
        <div class="shorts-player-vignette" aria-hidden="true"></div>
      </div>
      <footer class="shorts-player-foot">
        <p id="shorts-player-title" class="shorts-player-title"></p>
      </footer>
    </div>

    <div id="shorts-toast" class="shorts-toast" aria-live="polite"></div>
  </main>

  <script src="/js/config.js"></script>
  <script src="/js/api.js?v=57"></script>
  <script src="/js/auth.js?v=18"></script>
  <script src="/js/nav.js?v=80"></script>
  <script src="/js/main.js?v=2"></script>
  <script src="/js/shorts-page.js?v=11"></script>
</body>
</html>
