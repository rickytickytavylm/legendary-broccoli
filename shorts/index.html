<!DOCTYPE html>
<html lang="ru">
<head>
  <!-- PWA Standalone Meta Tags -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Система" />
  <link rel="apple-touch-icon" href="/assets/logo2.png" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' https://cdn.jsdelivr.net https://telegram.org; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' wss: https://web-production-3cb7a.up.railway.app https://*.up.railway.app https://cdn.jsdelivr.net https://sistema-molodtsov.storage.yandexcloud.net https://*.storage.yandexcloud.net; media-src 'self' blob: data: https://web-production-3cb7a.up.railway.app https://*.up.railway.app https://sistema-molodtsov.storage.yandexcloud.net https://*.storage.yandexcloud.net; manifest-src 'self'; upgrade-insecure-requests" />

  <title>Shorts — Система Молодцова</title>
  <link rel="stylesheet" href="/css/style.css?v=160" />
  <link rel="stylesheet" href="/css/nav.css?v=76" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box}

    html.shorts-input-cooldown #shorts-grid button.short-card {
      pointer-events: none;
    }

    body.shorts-page {
      background: #07100E;
      font-family: 'Inter', sans-serif;
    }

    body.shorts-page .shorts-after-hero {
      padding-bottom: clamp(104px, 22vw, 128px);
    }

    /* Как сообщество: лишний верхний отступ у области сетки после hero */
    @media (max-width: 620px) {
      body.shorts-page .shorts-after-hero.ux-page-shell {
        padding-top: clamp(12px, 3.2vw, 20px);
      }
    }

    @media (min-width: 621px) {
      body.shorts-page .shorts-after-hero {
        padding-top: clamp(14px, 3.5vw, 26px);
      }
    }

    .masonry {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      max-width: 1080px;
      margin-inline: auto;
      width: 100%;
    }

    @media (min-width: 900px) {
      .masonry {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: clamp(14px, 2vw, 22px);
        max-width: 1140px;
      }
    }

    @media (min-width: 1200px) {
      .masonry {
        max-width: min(1180px, calc(100vw - 232px - 72px));
      }
    }

    button.short-card {
      appearance: none;
      margin: 0;
      padding: 0;
      border: none;
      font: inherit;
      cursor: pointer;
      text-align: left;
      color: inherit;
    }

    .short-card {
      break-inside: avoid;
      margin-bottom: 0;
      display: block;
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.07);
      transition: transform .3s ease, border-color .3s ease, box-shadow .3s ease;
    }

    button.short-card:hover,
    button.short-card:focus-visible {
      transform: translateY(-4px);
      border-color: rgba(255,255,255,.15);
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
      outline: none;
    }

    .short-card__poster {
      position: relative;
      overflow: hidden;
      display: block;
      background: rgba(255,255,255,.03);
    }

    .short-card__poster img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .short-card--9x16 .short-card__poster { aspect-ratio: 9/16; }

    .short-card__overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(5,5,6,.1) 0%,
        rgba(5,5,6,.55) 100%
      );
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .3s ease;
      pointer-events: none;
    }

    button.short-card:hover .short-card__overlay,
    button.short-card:focus-visible .short-card__overlay {
      background: linear-gradient(
        180deg,
        rgba(5,5,6,.05) 0%,
        rgba(5,5,6,.4) 100%
      );
    }

    .short-card__play {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .25s ease, transform .25s ease, border-color .25s ease;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
    }

    button.short-card:hover .short-card__play,
    button.short-card:focus-visible .short-card__play {
      background: rgba(0, 0, 0, 0.7);
      border-color: rgba(255, 255, 255, 0.45);
      transform: scale(1.08);
    }

    .short-card__play svg {
      width: 20px;
      height: 20px;
      color: #fff;
      transform: translateX(0.5px);
      display: block;
    }

    .short-card__caption {
      padding: 14px 16px 16px;
      display: block;
    }

    .short-card__caption span {
      color: rgba(255,255,255,.72);
      font-size: 13px;
      font-weight: 500;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 5;
      line-clamp: 5;
      overflow: hidden;
    }

    .short-card__caption .short-card__more {
      display: inline-flex;
      margin-top: 6px;
      padding: 4px 9px;
      width: fit-content;
      border-radius: 999px;
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
      background: rgba(0,0,0,.36);
      border: 1px solid rgba(255,255,255,.16);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
    }

    .short-card__duration {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,.8);
      letter-spacing: 0.3px;
      z-index: 2;
    }

    .short-card__likes {
      position: absolute;
      left: 12px;
      bottom: 12px;
      z-index: 3;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 30px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.42);
      -webkit-backdrop-filter: blur(14px);
      backdrop-filter: blur(14px);
      color: rgba(255,255,255,.86);
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
      pointer-events: auto;
    }

    .short-card__likes.is-liked {
      color: #fff;
      border-color: rgba(255,90,121,.48);
      background: rgba(255,90,121,.24);
    }

    .short-card__likes svg {
      width: 14px;
      height: 14px;
      display: block;
    }

    .shorts-player-like {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      min-width: 48px;
      min-height: 48px;
      padding: 6px 4px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: rgba(255,255,255,.92);
      font: inherit;
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
      cursor: pointer;
      pointer-events: auto;
      -webkit-tap-highlight-color: transparent;
    }

    .shorts-player-actions {
      position: absolute;
      right: max(10px, env(safe-area-inset-right));
      top: 50%;
      transform: translateY(-50%);
      bottom: auto;
      z-index: 8;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      pointer-events: none;
    }

    .shorts-player-like.is-liked {
      color: #fff;
    }

    .shorts-player-like.is-liked svg {
      color: #5ac8fa;
      fill: #5ac8fa;
    }

    .shorts-player-like svg {
      width: 28px;
      height: 28px;
      display: block;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,.75));
    }

    .shorts-player-like span {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: -.01em;
      text-shadow: 0 1px 6px rgba(0,0,0,.9);
    }

    button.short-card.short-card--busy {
      opacity: 0.76;
      pointer-events: none;
    }

    .shorts-toast {
      position: fixed;
      left: max(16px, env(safe-area-inset-left));
      right: max(16px, env(safe-area-inset-right));
      bottom: max(100px, calc(16px + env(safe-area-inset-bottom)));
      z-index: 4000;
      max-width: min(420px, 100%);
      margin-inline: auto;
      padding: 14px 18px;
      border-radius: 16px;
      background: rgba(12, 14, 22, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 16px 44px rgba(0, 0, 0, 0.55);
      font-size: 14px;
      line-height: 1.45;
      color: rgba(255, 255, 255, 0.92);
      opacity: 0;
      transform: translateY(14px);
      pointer-events: none;
      transition:
        opacity 0.22s ease,
        transform 0.22s ease;
    }

    .shorts-toast.shorts-toast--visible {
      opacity: 1;
      transform: translateY(0);
    }

    .shorts-page-error {
      color: rgba(255,255,255,.52);
      text-align: center;
      padding: 40px 20px;
    }

    html:has(body.shorts-player-open) {
      overflow: hidden;
      scrollbar-width: none;
    }
    body.shorts-player-open {
      overflow: hidden;
      scrollbar-width: none;
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    html:has(body.shorts-player-open)::-webkit-scrollbar,
    body.shorts-player-open::-webkit-scrollbar {
      display: none;
    }

    /* Полноэкранный вертикальный режим как в Shorts/Reels — без touch-action:none (ломало тапы по controls на iOS)
       Важно: не полагаться только на .u-hidden — здесь есть display:flex, он перебивает глобальный .u-hidden. */
    .shorts-player-overlay {
      position: fixed;
      inset: 0;
      z-index: 2500;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    .shorts-player-overlay.u-hidden {
      display: none !important;
      visibility: hidden;
      pointer-events: none;
    }

    .shorts-player-topbar {
      position: absolute;
      top: max(12px, env(safe-area-inset-top));
      left: max(12px, env(safe-area-inset-left));
      right: max(12px, env(safe-area-inset-right));
      z-index: 10;
      display: flex;
      justify-content: flex-start;
      pointer-events: none;
    }

    .shorts-player-dismiss {
      appearance: none;
      margin: 0;
      padding: 0;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(0, 0, 0, 0.38);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      color: #fff;
      cursor: pointer;
      display: grid;
      place-items: center;
      pointer-events: auto;
      transition: background 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
    }

    .shorts-player-dismiss:hover,
    .shorts-player-dismiss:focus-visible {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.3);
      outline: none;
    }

    .shorts-player-dismiss:active {
      transform: scale(0.94);
    }

    .shorts-player-dismiss svg {
      width: 20px;
      height: 20px;
      display: block;
    }

    .shorts-player-stage {
      flex: 1;
      min-height: 0;
      position: relative;
      width: 100%;
      background: #000;
      cursor: pointer;
    }

    .shorts-player-poster {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: 0;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.18s ease;
    }

    .shorts-player-poster.is-visible {
      opacity: 1;
      visibility: visible;
    }

    .shorts-player-spinner {
      position: absolute;
      inset: 0;
      z-index: 8;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.35);
    }

    .shorts-player-spinner.is-visible {
      display: flex;
    }

    .shorts-player-spinner span {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.22);
      border-top-color: rgba(255, 255, 255, 0.9);
      animation: shorts-spin 0.8s linear infinite;
    }

    @keyframes shorts-spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Вертикально «во весь экран»: под шапкой с кнопкой; contain — без обрезки кадра */
    .shorts-player-stage video {
      position: absolute;
      inset: 0;
      z-index: 3;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
      border-radius: 2px;
    }

    .shorts-player-center-control {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 9;
      width: 82px;
      height: 82px;
      transform: translate(-50%, -50%) scale(.92);
      border: 0;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #fff;
      background: rgba(0, 0, 0, .34);
      box-shadow: 0 14px 44px rgba(0,0,0,.38);
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease, background .18s ease;
    }

    .shorts-player-center-control.is-visible {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
      pointer-events: auto;
    }

    .shorts-player-center-control svg {
      width: 38px;
      height: 38px;
      display: block;
    }

    .shorts-player-center-control .icon-play {
      transform: translateX(2px);
    }

    .shorts-player-center-control.is-playing .icon-play,
    .shorts-player-center-control:not(.is-playing) .icon-pause {
      display: none;
    }

    .shorts-player-progress {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 11;
      height: 16px;
      background: rgba(255,255,255,.16);
      cursor: pointer;
      pointer-events: auto;
      touch-action: none;
    }

    .shorts-player-progress span {
      display: block;
      width: 0%;
      height: 3px;
      margin-top: 13px;
      background: rgba(255,255,255,.82);
      transition: width .08s linear;
      pointer-events: none;
    }

    @media (max-width: 768px) {
      .shorts-player-stage video {
        object-fit: cover !important;
      }
    }

    /* Краевая матовка поверх видео: усиливает кадр, не блокирует тапы (pointer-events: none) */
    .shorts-player-vignette {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.18) 0%, transparent 18%),
        linear-gradient(
          90deg,
          rgba(0, 0, 0, 0.20) 0%,
          transparent 10%,
          transparent 90%,
          rgba(0, 0, 0, 0.20) 100%
        ),
        linear-gradient(0deg, rgba(0, 0, 0, 0.12) 0%, transparent min(96px, 18%));
    }

    .shorts-player-foot {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 6;
      padding: 32px 18px max(24px, calc(16px + env(safe-area-inset-bottom)));
      background: linear-gradient(to top, rgba(0, 0, 0, 0.58) 0%, rgba(0, 0, 0, 0.16) 64%, transparent 100%);
      pointer-events: none;
    }

    .shorts-player-title {
      margin: 0;
      font-size: 14.5px;
      font-weight: 500;
      line-height: 1.5;
      letter-spacing: -0.01em;
      color: rgba(255, 255, 255, 0.96);
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.9), 0 2px 14px rgba(0, 0, 0, 0.6);
      max-height: 3.1em;
      overflow: hidden;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      cursor: pointer;
      position: relative;
      pointer-events: auto;
      padding: 0;
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
    }

    .shorts-player-title::after {
      content: " ... Ещё";
      display: inline-block;
      color: #ffffff;
      font-weight: 800;
      margin-left: 4px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.9);
    }

    /* Жидкое стекло (Liquid Glass) Выдвижная модалка для описания */
    .shorts-desc-modal {
      position: fixed;
      inset: 0;
      z-index: 3000;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      pointer-events: none;
      transition: visibility 0.3s ease;
    }

    .shorts-desc-modal.u-hidden {
      display: none !important;
    }

    .shorts-desc-modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .shorts-desc-modal:not(.u-hidden) .shorts-desc-modal-backdrop {
      opacity: 1;
      pointer-events: auto;
    }

    .shorts-desc-modal-content {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.03) 100%);
      backdrop-filter: blur(40px) saturate(220%);
      -webkit-backdrop-filter: blur(40px) saturate(220%);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-bottom: 0;
      border-radius: 28px 28px 0 0;
      box-shadow: 
        0 -20px 60px rgba(0, 0, 0, 0.65),
        inset 0 1.5px 0 rgba(255, 255, 255, 0.35);
      padding: 20px 24px max(32px, calc(16px + env(safe-area-inset-bottom)));
      pointer-events: auto;
      transform: translateY(100%);
      transition: transform 0.42s cubic-bezier(0.175, 0.885, 0.32, 1.1); /* springy easing */
    }

    .shorts-desc-modal:not(.u-hidden) .shorts-desc-modal-content {
      transform: translateY(0);
    }

    .shorts-desc-modal-handle {
      width: 40px;
      height: 5px;
      background: rgba(255, 255, 255, 0.24);
      border-radius: 99px;
      margin: 0 auto 16px;
      cursor: pointer;
    }

    .shorts-desc-modal-body {
      max-height: clamp(200px, 50vh, 480px);
      overflow-y: auto;
      font-size: 15px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.9);
      padding-bottom: 12px;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }

    .shorts-desc-modal-body p {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .shorts-desc-modal-close {
      appearance: none;
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 11px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
      transition: background 0.2s;
    }

    .shorts-desc-modal-close:hover {
      background: rgba(255, 255, 255, 0.14);
    }
  </style>
</head>
<body class="dark-theme ux-route-page shorts-page">
  <main class="main-content">
    <section class="hero hero-courses" style="background:linear-gradient(to bottom, rgba(0,0,0,.24) 0%, rgba(0,0,0,.82) 74%, var(--bg-main) 100%), url('/assets/webp/shorts_hero.webp') center/cover no-repeat;">
      <div class="hero-content text-left">
        <p class="hub-kicker fade-up">Видео</p>
        <h1 class="hero-title fade-up">Shorts</h1>
        <p class="hero-subtitle fade-up">Короткие видео с ключевыми идеями</p>
      </div>
    </section>

    <div class="ux-page-shell shorts-after-hero">
      <div class="masonry" id="shorts-grid" aria-busy="true"></div>
    </div>

    <div id="shorts-player-overlay" class="shorts-player-overlay u-hidden" aria-hidden="true">
      <div class="shorts-player-topbar">
        <button
          type="button"
          class="shorts-player-dismiss"
          data-shorts-player-close
          aria-label="Закрыть"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7" />
          </svg>
        </button>
      </div>
      <div class="shorts-player-stage" id="shorts-player-stage">
        <img id="shorts-player-poster" class="shorts-player-poster" alt="" />
        <div id="shorts-player-spinner" class="shorts-player-spinner" aria-hidden="true">
          <span></span>
        </div>
        <video id="shorts-player-video" playsinline webkit-playsinline preload="auto" disablepictureinpicture controlslist="nodownload noplaybackrate noremoteplayback"></video>
        <div class="shorts-player-vignette" aria-hidden="true"></div>
        <button type="button" id="shorts-player-center-control" class="shorts-player-center-control" aria-label="Пауза">

        </button>
        <div class="shorts-player-actions">
          <button type="button" id="shorts-player-like" class="shorts-player-like" aria-pressed="false" aria-label="Нравится">
            <svg viewBox="0 0 24 24" aria-hidden="true" fill="currentColor"><path d="M2 21h2.5a1 1 0 0 0 1-1v-9a1 1 0 0 0-1-1H2v11Zm19.83-9.12c.11-.25.17-.52.17-.8V10a2 2 0 0 0-2-2h-5.5l.83-3.98.03-.32a1.5 1.5 0 0 0-.44-1.06L13.92 2 8.3 7.62A2 2 0 0 0 7.5 9.2V19a2 2 0 0 0 2 2h8.5a2 2 0 0 0 1.84-1.22l2-4.66Z"/></svg>
            <span data-shorts-player-like-count>203</span>

        </div>
        <div class="shorts-player-progress" id="shorts-player-progress" role="slider" aria-label="Позиция видео" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"><span id="shorts-player-progress-bar"></span></div>
      </div>
      <footer class="shorts-player-foot">
        <p id="shorts-player-title" class="shorts-player-title" title="Нажмите, чтобы раскрыть описание"></p>

      <!-- Стеклянная выдвижная модалка описания -->
      <div id="shorts-desc-modal" class="shorts-desc-modal u-hidden" aria-hidden="true">

          <button type="button" class="shorts-desc-modal-close" data-shorts-desc-close>Свернуть</button>
