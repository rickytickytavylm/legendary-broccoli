<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Неделя — Система Молодцова</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .week-page { padding: 32px 24px 80px; max-width: 1280px; margin: 0 auto; }

    /* iOS glass back button */
    .back-link-glass {
      display: inline-flex; align-items: center; gap: 8px;
      color: rgba(255,255,255,.7); text-decoration: none; font-size: 14px;
      padding: 10px 18px;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      margin-bottom: 28px;
      transition: all .2s;
    }
    .back-link-glass:hover { background: rgba(255,255,255,.12); color: #fff; border-color: rgba(255,255,255,.25); }

    .week-hero { padding: 0 0 24px; }
    .week-hero .top-text { color: rgba(255,255,255,.55); font-size: 12px; letter-spacing: 2px; font-weight: 600; margin-bottom: 12px; }
    .week-hero h1 { color: #fff; font-size: 32px; font-weight: 700; letter-spacing: -1px; margin: 0 0 8px; }
    .week-hero p { color: rgba(255,255,255,.6); font-size: 15px; line-height: 1.5; max-width: 640px; }

    /* Layout: player left, weeks accordion right */
    .course-layout { display: grid; grid-template-columns: 1fr 380px; gap: 28px; }
    .course-main { min-width: 0; }
    .video-container { position: relative; background: #000; border-radius: 16px; overflow: hidden; aspect-ratio: 16/9; }
    .video-container video { width: 100%; height: 100%; display: block; border-radius: 16px; }
    .watermark { position: absolute; top: 16px; left: 16px; z-index: 5; pointer-events: none; opacity: .55; }
    .watermark img { height: 28px; width: auto; filter: brightness(1.2); }

    .course-meta { margin-top: 16px; color: rgba(255,255,255,.6); font-size: 14px; }

    .sidebar { background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.08); border-radius: 20px; padding: 20px; height: fit-content; }
    .sidebar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .sidebar-header h3 { color: #fff; font-size: 16px; font-weight: 600; margin: 0; }
    .lessons-count { color: rgba(255,255,255,.5); font-size: 13px; }

    /* Accordion */
    .week-group { margin-bottom: 8px; }
    .week-toggle {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px; padding: 12px 14px; color: #fff; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all .15s;
    }
    .week-toggle:hover { background: rgba(255,255,255,.07); }
    .week-toggle svg { width: 16px; height: 16px; color: rgba(255,255,255,.5); transition: transform .2s; }
    .week-toggle.open svg { transform: rotate(180deg); }
    .week-content { display: none; padding: 6px 4px; }
    .week-content.open { display: block; }

    .lesson-row {
      display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 10px;
      cursor: pointer; transition: all .12s; border: 1px solid transparent;
    }
    .lesson-row:hover { background: rgba(255,255,255,.04); }
    .lesson-row.active { background: rgba(255,255,255,.06); border-color: rgba(255,255,255,.1); }
    .lesson-row .l-num {
      width: 28px; height: 28px; border-radius: 8px; background: rgba(255,255,255,.08);
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,.7); font-size: 12px; font-weight: 600; flex-shrink: 0;
    }
    .lesson-row.active .l-num { background: #7c3aed; color: #fff; }
    .lesson-row .l-info { min-width: 0; }
    .lesson-row .l-title { color: rgba(255,255,255,.85); font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lesson-row.active .l-title { color: #fff; }
    .lesson-row .l-dur { color: rgba(255,255,255,.4); font-size: 11px; margin-top: 1px; }
    .lesson-row .l-lock { color: rgba(255,255,255,.3); margin-left: auto; flex-shrink: 0; }

    /* Locked overlay */
    .video-locked { display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;min-height:240px;background:linear-gradient(135deg,rgba(255,255,255,.04),rgba(255,255,255,.02));border-radius:16px;padding:32px;text-align:center;border:1px solid rgba(255,255,255,.06) }

    /* Player overlay modal */
    .player-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.95); z-index: 1000; display:none; align-items:center; justify-content:center; padding: 20px; }
    .player-overlay.active { display: flex; }
    .player-box { width: 100%; max-width: 1100px; aspect-ratio: 16/9; position: relative; }
    .player-close { position: absolute; top: 24px; right: 24px; width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,.1); border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; }
    .player-close:hover { background: rgba(255,255,255,.2); }
    .player-video-wrap { background: #000; border-radius: 16px; overflow: hidden; width: 100%; height: 100%; position: relative; }
    .player-video-wrap video { width: 100%; height: 100%; display: block; }
    .player-title { color: #fff; font-size: 20px; font-weight: 600; margin-top: 16px; text-align: center; }

    @media (max-width: 1024px) {
      .course-layout { grid-template-columns: 1fr; }
      .sidebar { order: 2; }
    }
    @media (max-width: 600px) {
      .week-page { padding: 24px 16px 60px; }
      .week-hero h1 { font-size: 26px; }
    }
  </style>
</head>
<body class="dark-theme">

  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="brand brand-outlined">
        <img src="assets/logo2.png" alt="Система Молодцова" class="brand-logo-img" />
      </a>
      <div class="nav-links desktop-only">
        <a href="courses.html" class="nav-link">Обучение</a>
        <a href="index.html#channels" class="nav-link">Каналы</a>
        <a href="index.html#support" class="nav-link">Поддержка</a>
      </div>
      <div class="nav-actions">
        <a href="courses.html" class="btn-nav-outline">Курсы</a>
      </div>
    </div>
  </nav>

  <main class="main-content">
    <div class="week-page">
      <a href="courses.html" class="back-link-glass">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Назад
      </a>

      <div class="course-layout">
        <div class="course-main">
          <div class="video-container" id="video-container">
            <video id="course-video" controls preload="metadata" style="width:100%;height:100%;display:block;border-radius:16px;"></video>
            <div class="watermark"><img src="assets/logo2.png" alt=""></div>
          </div>
          <div class="course-meta" id="course-meta"></div>
          <div class="lesson-info-block" id="lesson-info-block" style="display:none">
            <h2 class="lesson-title-main" id="lesson-title-main"></h2>
            <p class="lesson-desc-main" id="lesson-desc-main"></p>
            <div class="lesson-action-bar">
              <button class="lesson-action-btn" onclick="alert('Функция в разработке')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M20 6L9 17l-5-5"/></svg>
                Завершить эту программу
              </button>
            </div>
            <div class="lesson-resources">
              <div class="lesson-resource">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                Заметки
              </div>
              <div class="lesson-resource">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                Учебные материалы
              </div>
              <div class="lesson-resource">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                Домашнее задание
              </div>
              <div class="lesson-resource">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
                Практическая работа
              </div>
            </div>
          </div>
        </div>
        <div class="sidebar">
          <div class="sidebar-header">
            <h3>Программа курса</h3>
            <span id="lessons-count" class="lessons-count">0 уроков</span>
          </div>
          <div id="weeks-accordion"></div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-content">
      <div class="footer-brand">
        <img src="assets/logo2.png" alt="Система Молодцова" class="brand-logo-img small" />
      </div>
      <div class="footer-copy">2026 Все права защищены.</div>
    </div>
  </footer>

  <script src="js/week.js"></script>
</body>
</html>
