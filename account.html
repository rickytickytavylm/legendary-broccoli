<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Личный кабинет — Система Молодцова</title>
  <meta name="description" content="Ваш профиль, подписка и прогресс" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">

  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="brand brand-outlined">
        <img src="assets/logo2.png" alt="Система Молодцова" class="brand-logo-img" />
      </a>
      <div class="nav-links desktop-only">
        <a href="courses.html" class="nav-link">Обучение</a>
        <a href="index.html#channels" class="nav-link">Каналы</a>
        <a href="index.html#support" class="nav-link">Поддержка</a>
      </div>
      <div class="nav-actions">
        <button class="btn-nav-outline" onclick="logout()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
          <span class="desktop-only">Выйти</span>
        </button>
      </div>
    </div>
  </nav>

  <main class="main-content" style="padding-top:120px">
    <div class="section" style="max-width:720px;margin:0 auto">
      <a href="index.html" class="back-link-glass" style="margin-bottom:20px;display:inline-flex">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Назад
      </a>

      <!-- Профиль -->
      <div class="bento-card reveal" style="padding:32px;margin-bottom:20px;flex-direction:column;align-items:flex-start">
        <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
          <div style="width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
          </div>
          <div>
            <h2 id="acc-name" style="margin:0;font-size:20px;color:#fff;font-weight:700">Загрузка...</h2>
            <p id="acc-email" style="margin:4px 0 0;font-size:14px;color:var(--text-2)"></p>
          </div>
        </div>
        <div id="acc-tg" style="display:none;align-items:center;gap:8px;font-size:13px;color:var(--text-2);background:rgba(34,158,217,.1);padding:8px 14px;border-radius:10px;border:1px solid rgba(34,158,217,.15)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="color:#229ed9"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
          <span id="acc-tg-name"></span>
        </div>
      </div>

      <!-- Подписка -->
      <div class="bento-card reveal" style="padding:32px;margin-bottom:20px;flex-direction:column;align-items:flex-start">
        <h3 style="margin:0 0 12px;font-size:18px;color:#fff">Подписка</h3>
        <div id="sub-status" style="margin-bottom:16px">
          <span class="badge" style="background:rgba(255,255,255,.08);color:var(--text-2);padding:6px 14px;border-radius:20px;font-size:13px">Проверка...</span>
        </div>
        <p id="sub-expires" style="margin:0 0 16px;font-size:14px;color:var(--text-2)"></p>
        <a href="subscription.html" class="btn btn-primary" style="font-size:14px;padding:12px 20px">Продлить или сменить тариф</a>
      </div>

      <!-- Прогресс -->
      <div class="bento-card reveal" style="padding:32px;margin-bottom:20px;flex-direction:column;align-items:flex-start">
        <h3 style="margin:0 0 16px;font-size:18px;color:#fff">Прогресс обучения</h3>
        <div id="progress-list" style="width:100%;display:flex;flex-direction:column;gap:12px">
          <p style="color:var(--text-2);font-size:14px">Загрузка прогресса...</p>
        </div>
      </div>

    </div>
  </main>

  <footer class="footer">
    <div class="footer-content">
      <div class="footer-brand"><img src="assets/logo2.png" alt="Система Молодцова" class="brand-logo-img small"/></div>
      <div class="footer-links"><a href="about.html">О сообществе</a><a href="author.html">Об авторе</a></div>
      <div class="footer-copy">2026 Все права защищены.</div>
    </div>
  </footer>

  <nav class="glass-tab-bar">
    <a href="index.html" class="tab-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Главная</span></a>
    <a href="courses.html" class="tab-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="3"/><path d="M8 21h8M12 17v4"/></svg><span>Курсы</span></a>
    <a href="subscription.html" class="tab-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z"/></svg><span>Подписка</span></a>
    <a href="index.html#channels" class="tab-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Каналы</span></a>
  </nav>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (async () => {
      if (!window.API.isLoggedIn()) {
        window.location.href = 'index.html';
        return;
      }
      try {
        const { user } = await window.API.me();
        document.getElementById('acc-name').textContent = user.first_name || user.telegram_username || 'Пользователь';
        document.getElementById('acc-email').textContent = user.email || ('ID: ' + user.id);
        if (user.telegram_username) {
          document.getElementById('acc-tg').style.display = 'inline-flex';
          document.getElementById('acc-tg-name').textContent = '@' + user.telegram_username;
        }

        const sub = await window.API.getSubscription();
        const statusEl = document.getElementById('sub-status');
        const expiresEl = document.getElementById('sub-expires');
        if (sub.subscription_active) {
          statusEl.innerHTML = '<span class="badge" style="background:rgba(74,222,128,.15);color:#4ade80;padding:6px 14px;border-radius:20px;font-size:13px">Активна</span>';
          if (sub.expires_at) {
            const d = new Date(sub.expires_at);
            expiresEl.textContent = 'Действует до ' + d.toLocaleDateString('ru-RU');
          }
        } else {
          statusEl.innerHTML = '<span class="badge" style="background:rgba(255,255,255,.08);color:var(--text-2);padding:6px 14px;border-radius:20px;font-size:13px">Не оформлена</span>';
          expiresEl.textContent = 'Оформите подписку для доступа ко всем материалам.';
        }

        const prog = await window.API.request('GET', '/content/progress');
        const list = document.getElementById('progress-list');
        if (prog.progress && prog.progress.length > 0) {
          list.innerHTML = prog.progress.map(p => `
            <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.06)">
              <span style="font-size:14px;color:#fff">Урок ${p.lesson_id}</span>
              <div style="display:flex;align-items:center;gap:10px">
                <div style="width:100px;height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden">
                  <div style="width:${p.progress_percent}%;height:100%;background:#4ade80;border-radius:2px;transition:width .3s"></div>
                </div>
                <span style="font-size:12px;color:var(--text-2);min-width:36px;text-align:right">${p.progress_percent}%</span>
              </div>
            </div>
          `).join('');
        } else {
          list.innerHTML = '<p style="color:var(--text-2);font-size:14px">Начните обучение — прогресс появится здесь.</p>';
        }
      } catch (e) {
        console.error(e);
      }
    })();

    function logout() {
      window.API.logout();
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
